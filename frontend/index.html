<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food AI Assistant 🍎</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), 0 5px 15px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            border: 1px solid #f0f0f0;
        }

        header {
            background-color: #f8f9fa;
            padding: 30px 30px 20px;
            text-align: center;
            border-bottom: 1px solid #eaeef2;
        }

        h1 {
            font-size: 2.2rem;
            color: #1a2639;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .subtitle {
            color: #5a6b7a;
            font-size: 1.1rem;
            font-weight: 400;
        }

        .main-content {
            padding: 30px;
        }

        /* Карточка с параметрами пользователя */
        .user-params-card {
            background-color: #f8f9fa;
            border-radius: 30px;
            padding: 20px 25px;
            margin-bottom: 30px;
            border: 1px solid #eaeef2;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .params-title {
            font-size: 1.2rem;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .params-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .param-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .param-item label {
            font-size: 0.9rem;
            color: #5a6b7a;
            font-weight: 500;
        }

        .param-item input, .param-item select {
            padding: 12px 15px;
            border: 1px solid #d0d9e0;
            border-radius: 30px;
            font-size: 1rem;
            background: white;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .param-item input:focus, .param-item select:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.1);
        }

        .gender-group {
            display: flex;
            gap: 15px;
            align-items: center;
            padding: 5px 0;
        }

        .gender-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: normal;
            cursor: pointer;
        }

        .gender-group input[type="radio"] {
            accent-color: #2ecc71;
            width: 18px;
            height: 18px;
        }

        .daily-calories-result {
            background: white;
            border-radius: 40px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eaeef2;
            margin-top: 10px;
        }

        .daily-label {
            font-size: 1rem;
            color: #2c3e50;
        }

        .daily-value {
            font-size: 2rem;
            font-weight: 700;
            color: #2ecc71;
        }

        .daily-unit {
            font-size: 1rem;
            color: #7f8c8d;
            margin-left: 5px;
        }

        /* Чат-интерфейс */
        .chat-section {
            margin-bottom: 30px;
        }

        .chat-input-group {
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 18px 25px;
            border: 1px solid #d0d9e0;
            border-radius: 50px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .chat-input:focus {
            outline: none;
            border-color: #2ecc71;
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.15);
        }

        .chat-send-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 35px;
            border-radius: 50px;
            font-size: 1.1rem;
            transition: background-color 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
        }

        .chat-send-btn:hover {
            background-color: #27ae60;
            transform: scale(1.02);
            box-shadow: 0 8px 18px rgba(46, 204, 113, 0.4);
        }

        .chat-send-btn:active {
            transform: scale(0.98);
        }

        #loading {
            text-align: center;
            margin: 30px 0;
            display: none;
        }

        .spinner {
            border: 4px solid #f0f2f4;
            border-top: 4px solid #2ecc71;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-section {
            display: none;
        }

        .food-card {
            background-color: #f8f9fa;
            border-radius: 40px;
            padding: 30px;
            margin-top: 15px;
            border: 1px solid #eaeef2;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
        }

        .food-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .food-title {
            font-size: 1.8rem;
            color: #1a2639;
            font-weight: 600;
        }

        .calories-badge {
            background-color: #ff6b6b;
            color: white;
            padding: 8px 22px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.3rem;
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.3);
        }

        .calories-breakdown {
            background-color: white;
            border-radius: 30px;
            padding: 18px 22px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid #eaeef2;
        }

        .daily-percent {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2ecc71;
        }

        .daily-percent-bar {
            width: 200px;
            height: 14px;
            background-color: #eaeef2;
            border-radius: 20px;
            overflow: hidden;
        }

        .daily-percent-fill {
            height: 100%;
            background-color: #2ecc71;
            border-radius: 20px;
            transition: width 0.3s;
        }

        .nutrition-info {
            display: flex;
            gap: 25px;
            margin: 25px 0;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        .nutrient {
            text-align: center;
            flex: 1;
            min-width: 80px;
        }

        .nutrient-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2ecc71;
        }

        .nutrient-label {
            font-size: 0.9rem;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .recipe-section {
            background-color: white;
            border-radius: 30px;
            padding: 20px 25px;
            margin-top: 20px;
            border: 1px solid #eaeef2;
        }

        .recipe-title {
            color: #2c3e50;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
        }

        .error {
            background-color: #fee;
            color: #c0392b;
            padding: 18px 25px;
            border-radius: 50px;
            margin: 20px 0;
            border-left: 6px solid #e74c3c;
            display: none;
            font-weight: 500;
        }

        .api-status {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: #95a5a6;
        }

        .status-connected {
            color: #2ecc71;
            font-weight: 600;
        }

        .status-disconnected {
            color: #e74c3c;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .chat-input-group {
                flex-direction: column;
            }
            .chat-send-btn {
                padding: 16px;
            }
            .params-grid {
                grid-template-columns: 1fr;
            }
            .gender-group {
                flex-wrap: wrap;
            }
            .daily-calories-result {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .food-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .calories-breakdown {
                flex-direction: column;
                align-items: flex-start;
            }
            .daily-percent-bar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <i class="fas fa-robot" style="color:#2ecc71;"></i>
                Food AI Assistant
            </h1>
            <p class="subtitle">Введите ваши параметры и опишите желаемое блюдо</p>
        </header>

        <div class="main-content">
            <!-- Блок параметров пользователя -->
            <div class="user-params-card">
                <div class="params-title">
                    <i class="fas fa-user" style="color:#2ecc71;"></i>
                    Ваши данные
                </div>
                <div class="params-grid">
                    <div class="param-item">
                        <label>Возраст (лет)</label>
                        <input type="number" id="age" value="30" min="1" max="120" step="1">
                    </div>
                    <div class="param-item">
                        <label>Рост (см)</label>
                        <input type="number" id="height" value="170" min="50" max="250" step="1">
                    </div>
                    <div class="param-item">
                        <label>Вес (кг)</label>
                        <input type="number" id="weight" value="70" min="20" max="300" step="0.1">
                    </div>
                    <div class="param-item">
                        <label>Пол</label>
                        <div class="gender-group">
                            <label><input type="radio" name="gender" value="male" checked> Мужской</label>
                            <label><input type="radio" name="gender" value="female"> Женский</label>
                        </div>
                    </div>
                    <div class="param-item">
                        <label>Уровень активности</label>
                        <select id="activity">
                            <option value="1.2">Минимальная (сидячая работа)</option>
                            <option value="1.375">Низкая (лёгкие нагрузки 1-3 раза/нед)</option>
                            <option value="1.55" selected>Средняя (тренировки 3-5 раз/нед)</option>
                            <option value="1.725">Высокая (активная работа / спорт 6-7 раз/нед)</option>
                            <option value="1.9">Очень высокая (спортсмены, тяжёлый труд)</option>
                        </select>
                    </div>
                </div>

                <!-- Расчётная дневная норма -->
                <div class="daily-calories-result">
                    <span class="daily-label"><i class="fas fa-fire" style="color:#2ecc71;"></i> Дневная норма калорий</span>
                    <span>
                        <span class="daily-value" id="dailyCalories">2000</span>
                        <span class="daily-unit">ккал/день</span>
                    </span>
                </div>
                <!-- Скрытое поле для отправки на бэкенд (необязательно, но оставим) -->
                <input type="hidden" id="dailyCaloriesHidden" value="2000">
            </div>

            <!-- Чат-интерфейс -->
            <div class="chat-section">
                <div class="chat-input-group">
                    <input type="text" class="chat-input" id="queryInput"
                           placeholder="Например: «лёгкий ужин» или «что-то на 400 ккал»"
                           autocomplete="off">
                    <button class="chat-send-btn" id="recommendBtn">
                        <i class="fas fa-paper-plane"></i> Отправить
                    </button>
                </div>
            </div>

            <!-- Загрузка -->
            <div id="loading">
                <div class="spinner"></div>
                <p style="color:#5a6b7a;">Анализирую запрос и подбираю блюдо...</p>
            </div>

            <!-- Ошибка -->
            <div id="error" class="error">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <!-- Результат -->
            <div id="resultSection" class="result-section">
                <h2 style="color:#1a2639; margin-bottom:15px;"><i class="fas fa-utensils" style="color:#2ecc71;"></i> Рекомендация</h2>
                <div id="foodResult" class="food-card"></div>
            </div>

            <!-- Статус сервера -->
            <div class="api-status">
                <span id="serverStatus" class="status-connected">
                    <i class="fas fa-circle"></i> Сервер подключён
                </span>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ Замените на ваш реальный backend URL
        const API_URL = 'https://food-ai-assistant-9l1l.onrender.com'; // ваш backend
        // Для локального теста: const API_URL = 'http://localhost:8000';

        // Функция расчёта дневной нормы калорий (Миффлин-Сан Жеор)
        function calculateDailyCalories() {
            const age = parseInt(document.getElementById('age').value) || 30;
            const height = parseInt(document.getElementById('height').value) || 170;
            const weight = parseFloat(document.getElementById('weight').value) || 70;
            const isMale = document.querySelector('input[name="gender"]:checked').value === 'male';
            const activity = parseFloat(document.getElementById('activity').value) || 1.55;

            let bmr;
            if (isMale) {
                bmr = 10 * weight + 6.25 * height - 5 * age + 5;
            } else {
                bmr = 10 * weight + 6.25 * height - 5 * age - 161;
            }

            const daily = Math.round(bmr * activity);
            return daily;
        }

        // Обновление отображения дневной нормы
        function updateDailyCalories() {
            const daily = calculateDailyCalories();
            document.getElementById('dailyCalories').textContent = daily;
            document.getElementById('dailyCaloriesHidden').value = daily;
        }

        // Привязываем обработчики ко всем полям, влияющим на расчёт
        document.getElementById('age').addEventListener('input', updateDailyCalories);
        document.getElementById('height').addEventListener('input', updateDailyCalories);
        document.getElementById('weight').addEventListener('input', updateDailyCalories);
        document.getElementById('activity').addEventListener('change', updateDailyCalories);
        document.querySelectorAll('input[name="gender"]').forEach(radio => {
            radio.addEventListener('change', updateDailyCalories);
        });

        // Первоначальный расчёт
        updateDailyCalories();

        // Проверка статуса сервера
        async function checkServerStatus() {
            try {
                const resp = await fetch(`${API_URL}/`);
                const statusSpan = document.getElementById('serverStatus');
                if (resp.ok) {
                    statusSpan.innerHTML = '<i class="fas fa-circle"></i> Сервер подключён';
                    statusSpan.className = 'status-connected';
                } else {
                    statusSpan.innerHTML = '<i class="fas fa-circle"></i> Сервер не отвечает';
                    statusSpan.className = 'status-disconnected';
                }
            } catch {
                document.getElementById('serverStatus').innerHTML = '<i class="fas fa-circle"></i> Нет связи';
                document.getElementById('serverStatus').className = 'status-disconnected';
            }
        }

        // Основная функция получения рекомендации
        async function getRecommendation() {
            const query = document.getElementById('queryInput').value.trim();
            const dailyCal = parseInt(document.getElementById('dailyCaloriesHidden').value);

            if (!query) {
                showError('Пожалуйста, напишите, что вы хотите');
                return;
            }

            // Показываем загрузку
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('resultSection').style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/api/recommend`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: query,
                        user_calories: dailyCal,
                        preferences: []
                    })
                });

                if (!response.ok) throw new Error(`Ошибка ${response.status}`);

                const data = await response.json();
                document.getElementById('loading').style.display = 'none';
                displayRecommendation(data.recommendation, data.analysis, dailyCal);
            } catch (err) {
                console.error(err);
                document.getElementById('loading').style.display = 'none';
                showError('Не удалось получить ответ от сервера. Проверьте подключение.');
            }
        }

        // Отображение карточки блюда
        function displayRecommendation(food, analysis, dailyCal) {
            const percent = Math.round((food.calories / dailyCal) * 100);
            const percentWidth = Math.min(percent, 100);

            let analysisHtml = '';
            if (analysis) {
                analysisHtml = `
                    <div style="font-size:0.9rem; color:#6c7a89; margin-bottom:15px;">
                        <i class="fas fa-search"></i> Запрос: «${analysis.original_query}»
                        ${analysis.target_calories ? ` · целевые калории: ~${analysis.target_calories} ккал` : ''}
                    </div>
                `;
            }

            const tagsHtml = food.tags.map(t =>
                `<span style="background:#eaeef2; padding:5px 14px; border-radius:40px; font-size:0.8rem; color:#2c3e50;">#${t}</span>`
            ).join('');

            const resultHtml = `
                ${analysisHtml}
                <div class="food-header">
                    <h3 class="food-title">${food.name}</h3>
                    <span class="calories-badge">${food.calories} ккал</span>
                </div>
                <div class="calories-breakdown">
                    <div>
                        <div style="color:#5a6b7a;">От дневной нормы</div>
                        <span class="daily-percent">${percent}%</span>
                        <span style="color:#7f8c8d;"> (${food.calories} / ${dailyCal})</span>
                    </div>
                    <div class="daily-percent-bar">
                        <div class="daily-percent-fill" style="width:${percentWidth}%;"></div>
                    </div>
                </div>
                <p style="color:#2c3e50;"><i class="fas fa-tag" style="color:#2ecc71;"></i> Категория: <strong>${food.category}</strong></p>
                <p style="color:#3a4a5a;">${food.description}</p>
                <div class="nutrition-info">
                    <div class="nutrient"><div class="nutrient-value">${food.protein}г</div><div class="nutrient-label">Белки</div></div>
                    <div class="nutrient"><div class="nutrient-value">${food.carbs}г</div><div class="nutrient-label">Углеводы</div></div>
                    <div class="nutrient"><div class="nutrient-value">${food.fats}г</div><div class="nutrient-label">Жиры</div></div>
                </div>
                <div class="recipe-section">
                    <h4 class="recipe-title"><i class="fas fa-book-open" style="color:#2ecc71;"></i> Рецепт</h4>
                    <p style="white-space: pre-line; color:#2c3e50;">${food.recipe}</p>
                </div>
                <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
                    ${tagsHtml}
                </div>
            `;

            document.getElementById('foodResult').innerHTML = resultHtml;
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
        }

        function showError(msg) {
            document.getElementById('errorText').innerText = msg;
            document.getElementById('error').style.display = 'block';
        }

        // Обработчики
        document.getElementById('recommendBtn').addEventListener('click', getRecommendation);
        document.getElementById('queryInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') getRecommendation();
        });

        // При загрузке проверяем статус сервера
        window.addEventListener('load', checkServerStatus);
    </script>
</body>
</html>
